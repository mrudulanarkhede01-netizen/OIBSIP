<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily To-Do App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="container">

    <!-- Header -->
    <header class="app-header">
      <div class="header-left">
        <h1 class="app-title">My Tasks</h1>
        <p class="app-date" id="app-date"></p>
      </div>
      <div class="header-stats">
        <div class="stat-pill" id="stat-total">
          <span class="stat-num" id="total-count">0</span>
          <span class="stat-label">Total</span>
        </div>
        <div class="stat-pill pending-pill" id="stat-pending">
          <span class="stat-num" id="pending-count">0</span>
          <span class="stat-label">Pending</span>
        </div>
        <div class="stat-pill done-pill" id="stat-done">
          <span class="stat-num" id="done-count">0</span>
          <span class="stat-label">Done</span>
        </div>
      </div>
    </header>

    <!-- Add Task -->
    <div class="add-card">
      <div class="add-row">
        <div class="input-wrap">
          <i class="fa-solid fa-plus input-icon"></i>
          <input
            type="text"
            id="task-input"
            class="task-input"
            placeholder="Add a new task…"
            autocomplete="off"
          />
        </div>
        <button class="btn-add" id="add-btn" onclick="app.addTask()">
          Add Task
        </button>
      </div>
      <p class="hint-text">Press <kbd>Enter</kbd> to add quickly</p>
    </div>

    <!-- Sections -->
    <div class="sections-grid">

      <!-- Pending Tasks -->
      <section class="task-section" id="section-pending">
        <div class="section-header">
          <div class="section-title-row">
            <span class="section-dot pending-dot"></span>
            <h2 class="section-title">Pending Tasks</h2>
            <span class="section-badge pending-badge" id="badge-pending">0</span>
          </div>
        </div>
        <div class="task-list" id="pending-list">
          <div class="empty-state" id="empty-pending">
            <i class="fa-regular fa-clipboard"></i>
            <p>No pending tasks. Add one above!</p>
          </div>
        </div>
      </section>

      <!-- Completed Tasks -->
      <section class="task-section" id="section-completed">
        <div class="section-header">
          <div class="section-title-row">
            <span class="section-dot done-dot"></span>
            <h2 class="section-title">Completed Tasks</h2>
            <span class="section-badge done-badge" id="badge-done">0</span>
          </div>
          <button class="clear-btn" id="clear-btn" onclick="app.clearCompleted()" title="Clear all completed">
            <i class="fa-solid fa-trash-can"></i> Clear all
          </button>
        </div>
        <div class="task-list" id="completed-list">
          <div class="empty-state" id="empty-completed">
            <i class="fa-regular fa-circle-check"></i>
            <p>Completed tasks will appear here.</p>
          </div>
        </div>
      </section>

    </div>
  </div>

  <!-- Edit Modal -->
  <div class="modal-overlay" id="modal-overlay" onclick="app.closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h3 class="modal-title">Edit Task</h3>
        <button class="modal-close" onclick="app.closeModal()"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <textarea class="modal-input" id="modal-input" rows="3" placeholder="Task description…"></textarea>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="app.closeModal()">Cancel</button>
        <button class="btn-save" onclick="app.saveEdit()">Save Changes</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="js/app.js"></script>
</body>
</html>
