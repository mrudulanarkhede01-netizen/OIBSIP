<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SecureAuth — Sign In</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="page-wrapper">
    <div class="card">

      <div class="brand">
        <div class="brand-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
        </div>
        <span class="brand-name">SecureAuth</span>
      </div>

      <h1>Welcome back</h1>
      <p class="subtitle">Sign in to your account</p>

      <div class="alert alert-error" id="login-error"></div>

      <form id="login-form" novalidate>
        <div class="field">
          <label for="email">Email address</label>
          <input type="email" id="email" name="email" placeholder="abc@gmail.com" autocomplete="email" required />
          <span class="field-error" id="email-error"></span>
        </div>

        <div class="field">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <input type="password" id="password" name="password" placeholder="Your password" autocomplete="current-password" required />
            <button type="button" class="toggle-pass" onclick="togglePassword('password', this)" aria-label="Show password">
              <svg class="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </div>
          <span class="field-error" id="pass-error"></span>
        </div>

        <button type="submit" class="btn-primary" id="login-btn">
          <span class="btn-label">Sign in</span>
          <span class="btn-loader" style="display:none">Signing in…</span>
        </button>
      </form>

      <div class="divider"><span>or</span></div>

      <p class="link-row">Don't have an account? <a href="pages/register.html">Create one</a></p>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
